<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<div style="
  display: flex;
  align-items: flex-end;
  gap: 1.2rem;
  margin: 1rem 0 1.4rem 0;
  font-family: sans-serif;
">
  <label style="display:flex; flex-direction:column; gap:.3rem; font-size:.85rem; font-weight:600; color:#444;">
    Parcela
    <select id="sel-parcela" style="
      padding:.35rem .6rem; border:1px solid #ccc; border-radius:4px;
      font-size:.9rem; min-width:200px; cursor:pointer;
    "></select>
  </label>
</div>

<div id="plot-lidar" style="width:100%; height:600px;"></div>

<script>
(function () {
  const data   = JSON.parse(document.getElementById("lidar-data").textContent);
  const select = document.getElementById("sel-parcela");
  const div    = document.getElementById("plot-lidar");

  // Poblar selector
  data.forEach(p => {
    const opt = document.createElement("option");
    opt.value       = p.id;
    opt.textContent = p.nombre;
    select.appendChild(opt);
  });

  function getParcelaById(id) {
    return data.find(p => p.id == id);
  }

  function render(id) {
    const p = getParcelaById(id);
    if (!p) return;

    Plotly.react(div, [{
      type  : "scatter3d",
      mode  : "markers",
      x     : p.x,
      y     : p.y,
      z     : p.z,
      marker: {
        size       : 2,
        color      : p.z,
        colorscale : "Viridis",
        opacity    : 0.85,
        showscale  : true,
        colorbar   : { title: { text: "Altura (m)", side: "right" } }
      },
      hovertemplate: "X: %{x:.1f}<br>Y: %{y:.1f}<br>Z: %{z:.1f} m<extra></extra>"
    }], {
      title : {
        text    : p.nombre,
        font    : { size: 14, color: "#222" },
        x       : 0.5,
        xanchor : "center"
      },
      scene: {
        xaxis: { title: "X (m)", showbackground: false },
        yaxis: { title: "Y (m)", showbackground: false },
        zaxis: { title: "Z (m)", showbackground: false },
        camera: { eye: { x: 1.5, y: 1.5, z: 1.2 } }
      },
      paper_bgcolor: "white",
      margin: { t: 50, r: 20, b: 10, l: 10 }
    }, {
      responsive  : true,
      displaylogo : false,
      modeBarButtonsToRemove: ["lasso2d", "select2d"]
    });
  }

  select.addEventListener("change", () => render(select.value));
  if (data.length > 0) render(data[0].id);
})();
</script>
