<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<div style="
  display: flex;
  align-items: flex-end;
  gap: 1.2rem;
  margin: 1rem 0 1.4rem 0;
  font-family: sans-serif;
">
  <label style="display:flex; flex-direction:column; gap:.3rem; font-size:.85rem; font-weight:600; color:#444;">
    Árbol (treeID)
    <select id="sel-arbol" style="
      padding:.35rem .6rem; border:1px solid #ccc; border-radius:4px;
      font-size:.9rem; min-width:200px; cursor:pointer;
    "></select>
  </label>
</div>

<div id="plot-its" style="width:100%; height:520px;"></div>

<script>
(function () {
  const data   = JSON.parse(document.getElementById("its-data").textContent);
  const select = document.getElementById("sel-arbol");
  const div    = document.getElementById("plot-its");

  // Poblar selector con los treeID
  data.forEach(a => {
    const opt = document.createElement("option");
    opt.value       = a.treeID;
    opt.textContent = "Árbol " + a.treeID;
    select.appendChild(opt);
  });

  function getArbolById(id) {
    return data.find(a => String(a.treeID) === String(id));
  }

  function render(id) {
    const a = getArbolById(id);
    if (!a) return;

    Plotly.react(div, [{
      type: "bar",
      x: ["Altura (m)", "Área copa (m²)", "N.º puntos"],
      y: [a.altura, a.area_copa, a.n_puntos],
      marker: {
        color: ["#440154", "#21908c", "#fde725"]  // paleta Viridis
      },
      hovertemplate: "%{x}: %{y:.2f}<extra></extra>"
    }], {
      title: {
        text    : "Árbol " + a.treeID +
                  " — X: " + a.cx.toFixed(1) + " m, Y: " + a.cy.toFixed(1) + " m",
        font    : { size: 14, color: "#222" },
        x       : 0.5,
        xanchor : "center"
      },
      yaxis : { title: "Valor" },
      xaxis : { title: "Métrica" },
      paper_bgcolor: "white",
      margin: { t: 60, r: 20, b: 50, l: 60 }
    }, {
      responsive  : true,
      displaylogo : false,
      modeBarButtonsToRemove: ["lasso2d", "select2d"]
    });
  }

  select.addEventListener("change", () => render(select.value));
  if (data.length > 0) render(data[0].treeID);
})();
</script>
