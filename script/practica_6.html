<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<div style="
  display: flex;
  align-items: flex-end;
  gap: 1.2rem;
  margin: 1rem 0 1.4rem 0;
  font-family: sans-serif;
">
  <label style="display:flex; flex-direction:column; gap:.3rem; font-size:.85rem; font-weight:600; color:#444;">
    Árbol
    <select id="sel-arbol" style="
      padding:.35rem .6rem; border:1px solid #ccc; border-radius:4px;
      font-size:.9rem; min-width:200px; cursor:pointer;
    "></select>
  </label>
</div>

<div id="plot-arbol" style="width:100%; height:600px;"></div>

<script>
(function () {
  const data   = JSON.parse(document.getElementById("arboles-data").textContent);
  const select = document.getElementById("sel-arbol");
  const div    = document.getElementById("plot-arbol");

  // Poblar selector
  data.forEach(a => {
    const opt = document.createElement("option");
    opt.value       = a.treeID;
    opt.textContent = "Árbol " + a.treeID;
    select.appendChild(opt);
  });

  function getArbolById(id) {
    return data.find(a => a.treeID == id);
  }

  function render(id) {
    const a = getArbolById(id);
    if (!a) return;

    Plotly.react(div, [{
      type  : "scatter3d",
      mode  : "markers",
      x     : a.x,
      y     : a.y,
      z     : a.z,
      marker: {
        size       : 2,
        color      : a.z,
        colorscale : "Viridis",
        opacity    : 0.85,
        showscale  : true,
        colorbar   : { title: { text: "Altura (m)", side: "right" } }
      },
      hovertemplate: "X: %{x:.2f} m<br>Y: %{y:.2f} m<br>Z: %{z:.2f} m<extra></extra>"
    }], {
      title : {
        text    : "Árbol " + a.treeID,
        font    : { size: 14, color: "#222" },
        x       : 0.5,
        xanchor : "center"
      },
      scene: {
        xaxis: { title: "X (m)", showbackground: false },
        yaxis: { title: "Y (m)", showbackground: false },
        zaxis: { title: "Z (m)", showbackground: false },
        camera: { eye: { x: 1.5, y: 1.5, z: 1.2 } }
      },
      paper_bgcolor: "white",
      margin: { t: 50, r: 20, b: 10, l: 10 }
    }, {
      responsive  : true,
      displaylogo : false,
      modeBarButtonsToRemove: ["lasso2d", "select2d"]
    });
  }

  select.addEventListener("change", () => render(select.value));
  if (data.length > 0) render(data[0].treeID);
})();
</script>
